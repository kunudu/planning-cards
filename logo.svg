<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160" fill="none"
     role="img" aria-label="Planning Cards logo">
  <defs>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="120" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#292118"/>
      <stop offset="100%" stop-color="#171210"/>
    </linearGradient>
  </defs>

  <!-- Card body -->
  <rect x="4" y="4" width="112" height="152" rx="10" ry="10"
        fill="url(#cardGrad)" stroke="#d97706" stroke-width="1.5"/>

  <!-- Centred question mark -->
  <text x="60" y="93"
        font-family="Georgia,'Times New Roman',serif"
        font-size="64" font-weight="700"
        text-anchor="middle" dominant-baseline="central"
        fill="#fbbf24" opacity="0.95">?</text>

  <!-- Top-left corner pip -->
  <g>
    <text x="13" y="24"
          font-family="Georgia,'Times New Roman',serif"
          font-size="14" font-weight="700"
          fill="#fcd34d" opacity="0.9">?</text>
    <line x1="13" y1="27" x2="25" y2="27"
          stroke="#d97706" stroke-width="0.8" opacity="0.4"/>
  </g>

  <!-- Bottom-right corner pip (exact 180° reflection around card center) -->
  <g transform="rotate(180, 60, 80)">
    <text x="13" y="24"
          font-family="Georgia,'Times New Roman',serif"
          font-size="14" font-weight="700"
          fill="#fcd34d" opacity="0.9">?</text>
    <line x1="13" y1="27" x2="25" y2="27"
          stroke="#d97706" stroke-width="0.8" opacity="0.4"/>
  </g>

</svg>
